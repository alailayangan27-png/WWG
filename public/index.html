<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mint Devnet</title>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
body{
  background:black;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:320px;
}

button{
  margin:5px;
  padding:10px;
}
</style>
</head>

<body>

<div class="card">

<h2>Mint Devnet</h2>

<button onclick="connect()">Connect Wallet</button>
<p id="wallet"></p>

<button onclick="setAmount(1)">$1</button>
<button onclick="setAmount(5)">$5</button>
<button onclick="setAmount(10)">$10</button>

<p id="info"></p>

<button onclick="pay()">Pay & Mint</button>

<p id="status"></p>

</div>

<script>
let wallet = null;
let amount = 0;

const receiver = "ISI_WALLET_KAMU"; // DEVNET WALLET

async function connect(){
  const resp = await window.solana.connect();
  wallet = resp.publicKey.toString();
  document.getElementById("wallet").innerText = wallet;
}

function setAmount(a){
  amount = a;
  document.getElementById("info").innerText = "Pay $" + a;
}

async function pay(){
  if(!wallet) return alert("connect wallet");
  if(amount===0) return alert("pilih amount");

  const connection = new solanaWeb3.Connection(
    "https://api.devnet.solana.com"
  );

  const transaction = new solanaWeb3.Transaction().add(
    solanaWeb3.SystemProgram.transfer({
      fromPubkey: window.solana.publicKey,
      toPubkey: new solanaWeb3.PublicKey(receiver),
      lamports: amount * 1000000
    })
  );

  transaction.feePayer = window.solana.publicKey;
  transaction.recentBlockhash = (
    await connection.getLatestBlockhash()
  ).blockhash;

  const signed = await window.solana.signTransaction(transaction);

  const signature = await connection.sendRawTransaction(
    signed.serialize()
  );

  document.getElementById("status").innerText = "Processing...";

  // kirim ke backend
  const res = await fetch("/api/mint", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      wallet,
      amount,
      signature
    })
  });

  const data = await res.json();

  document.getElementById("status").innerText =
    data.error ? data.error : "✅ Mint sukses!";
}
</script>

</body>
</html>
