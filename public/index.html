<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
body{
  background:#0b0b0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}
.card{
  background:#111;
  padding:20px;
  border-radius:20px;
  text-align:center;
}
button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>Mint</h2>

<button onclick="connect()">Connect</button>
<p id="wallet">Not connected</p>

<button onclick="setAmount(1)">$1</button>
<button onclick="setAmount(5)">$5</button>
<button onclick="setAmount(10)">$10</button>

<p id="info"></p>

<button onclick="pay()">Pay</button>

<p id="status"></p>

</div>

<script>
let wallet = null;
let amount = 0;

// ⚠️ GANTI WALLET KAMU
const receiver = "Egp6tFjnQV9pZ277rS2m16fQbFPKYeZKGQ5RVYd9Mxec";

function setAmount(a){
  amount = a;
  document.getElementById("info").innerText = "Pay $" + a;
}

async function connect(){
  if(!window.solana){
    alert("Buka di browser wallet!");
    return;
  }

  const resp = await window.solana.connect();
  wallet = resp.publicKey.toString();

  document.getElementById("wallet").innerText = wallet;
}

async function pay(){

  try{

    if(!wallet) return alert("connect dulu");
    if(!amount) return alert("pilih amount");

    const connection = new solanaWeb3.Connection(
      "https://api.mainnet-beta.solana.com"
    );

    const lamports = amount * 1000000;

    const tx = new solanaWeb3.Transaction().add(
      solanaWeb3.SystemProgram.transfer({
        fromPubkey: window.solana.publicKey,
        toPubkey: new solanaWeb3.PublicKey(receiver),
        lamports
      })
    );

    tx.feePayer = window.solana.publicKey;

    const { blockhash } = await connection.getLatestBlockhash();
    tx.recentBlockhash = blockhash;

    const signed = await window.solana.signTransaction(tx);

    const signature = await connection.sendRawTransaction(
      signed.serialize()
    );

    document.getElementById("status").innerText =
      "TX: " + signature;

    console.log("Signature:", signature);

    // kirim ke backend
    const res = await fetch("/api/verify", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ wallet, amount, signature })
    });

    const data = await res.json();

    document.getElementById("status").innerText =
      data.error || "✅ Success";

  }catch(err){
    console.log(err);
    alert("Error: " + err.message);
  }
}
</script>

</body>
</html>
