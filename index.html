<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mint Token</title>

<!-- FIX CDN -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  background: black;
  color: white;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.card {
  width: 320px;
}
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}
.buttons {
  display: flex;
  gap: 6px;
}
.buttons button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  background: #222;
  color: white;
  border: none;
}
.main {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: lime;
  color: black;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">

<h2>Mint Token</h2>

<input id="wallet" placeholder="Wallet address">

<div class="buttons">
  <button onclick="setAmount(1)">$1</button>
  <button onclick="setAmount(5)">$5</button>
  <button onclick="setAmount(10)">$10</button>
  <button onclick="setAmount(50)">$50</button>
  <button onclick="setAmount(100)">$100</button>
</div>

<p>Mint: $<span id="usd">1</span></p>
<p>Receive: <span id="token">1000</span> TOKEN</p>

<button class="main" onclick="mint()">Mint Now</button>

<p id="status"></p>

</div>

<script>
// ===================
// INIT SUPABASE
// ===================
const supabaseUrl = "https://zdwolnqdknlnzktbpfig.supabase.co"
const supabaseKey = "sb_publishable__dDKpBQAKtUo_Xxal9x4kQ_UcpaNn0N"

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

// ===================
// AMOUNT
// ===================
let selectedAmount = 1

function setAmount(val) {
  selectedAmount = val
  document.getElementById("usd").innerText = val
  document.getElementById("token").innerText = val * 1000
}

// ===================
// MINT
// ===================
async function mint() {
  const wallet = document.getElementById("wallet").value

  if (!wallet) {
    alert("Enter wallet")
    return
  }

  document.getElementById("status").innerText = "Processing..."

  try {
    const { error } = await supabase
      .from("mints")
      .insert([
        {
          wallet: wallet,
          amount: selectedAmount,
          usd: selectedAmount,
          token: selectedAmount * 1000
        }
      ])

    if (error) {
      document.getElementById("status").innerText = "Error: " + error.message
    } else {
      document.getElementById("status").innerText = "Success ✅"
    }

  } catch (err) {
    document.getElementById("status").innerText = "Connection error"
  }
}
</script>

</body>
</html>
