<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mint Token</title>

<!-- Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  background: black;
  color: white;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 320px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.buttons {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}

.buttons button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  background: #222;
  color: white;
  border: none;
}

.buttons button.active {
  background: lime;
  color: black;
}

.main {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: lime;
  color: black;
  border: none;
  margin-top: 10px;
}

#status {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Mint Token</h2>

  <input id="wallet" placeholder="Wallet address">

  <div class="buttons">
    <button onclick="selectAmount(1, this)">$1</button>
    <button onclick="selectAmount(5, this)">$5</button>
    <button onclick="selectAmount(10, this)">$10</button>
    <button onclick="selectAmount(50, this)">$50</button>
    <button onclick="selectAmount(100, this)">$100</button>
  </div>

  <p id="info"></p>

  <button class="main" onclick="mint()">Mint Now</button>

  <p id="status"></p>
</div>

<script>
/* =========================
   CONFIG (WAJIB GANTI)
========================= */
const SUPABASE_URL = "https://zdwolnqdknlnzktbpfig.supabase.co";
const SUPABASE_KEY = "sb_publishable__dDKpBQAKtUo_Xxal9x4kQ_UcpaNn0N";

/* =========================
   INIT
========================= */
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let selectedAmount = 0;

/* =========================
   PILIH NOMINAL
========================= */
function selectAmount(amount, el) {
  selectedAmount = amount;

  // reset semua tombol
  document.querySelectorAll(".buttons button").forEach(btn => {
    btn.classList.remove("active");
  });

  // aktifkan tombol yg dipilih
  el.classList.add("active");

  document.getElementById("info").innerText =
    "Mint $" + amount + " → Receive " + (amount * 1000) + " TOKEN";
}

/* =========================
   MINT FUNCTION
========================= */
async function mint() {
  const wallet = document.getElementById("wallet").value;

  if (!wallet) {
    setStatus("Masukkan wallet!", true);
    return;
  }

  if (selectedAmount === 0) {
    setStatus("Pilih jumlah mint!", true);
    return;
  }

  setStatus("Processing...", false);

  const { error } = await client
    .from("mints")
    .insert([
      {
        wallet: wallet,
        amount: selectedAmount,
        usd: selectedAmount
      }
    ]);

  if (error) {
    setStatus("Error: " + error.message, true);
  } else {
    setStatus("Berhasil mint $" + selectedAmount, false);
  }
}

/* =========================
   STATUS HELPER
========================= */
function setStatus(msg, isError) {
  const el = document.getElementById("status");
  el.innerText = msg;
  el.style.color = isError ? "red" : "lime";
}
</script>

</body>
</html>
